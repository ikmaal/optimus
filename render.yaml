# Render Blueprint — Postgres (free tier) + Next.js web service (free tier)
# https://render.com/docs/blueprint-spec
#
# Deploy: Render → Blueprints → New Blueprint → connect your GitHub repo

databases:
  - name: optimus-db
    plan: free
    region: singapore
    databaseName: optimus
    user: optimus

services:
  - type: web
    name: optimus
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    initialDeployHook: npx prisma db seed
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: optimus-db
          property: connectionString
      - key: CRON_SECRET
        generateValue: true
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
